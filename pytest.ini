[pytest]
# Test discovery patterns
testpaths = .
python_files = *_test.py test_*.py run_all_tests.py
python_functions = test_* *_test *_tests *_module_tests
python_classes = Test*

# Test markers for multi-layer test strategy
markers =
    unit: Fast isolated tests without external dependencies (< 1s each)
    integration: Tests requiring database, file system, or multi-component interaction (< 30s each)
    e2e: End-to-end tests requiring browser, API, or full system (may be slow)
    slow: Tests that take > 10 seconds to complete

# Output and coverage configuration
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    --color=yes
    --capture=no
    --cov=actions
    --cov=ai
    --cov=api
    --cov=browser
    --cov=caching
    --cov=cli
    --cov=config
    --cov=core
    --cov=genealogy
    --cov=integrations
    --cov=messaging
    --cov=mcp_server
    --cov=observability
    --cov=performance
    --cov=research
    --cov=testing
    --cov=ui
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=60

# Parallel execution (uncomment to enable)
# addopts = -n auto

# Test order randomization (uncomment to enable)
# addopts = --random-order

[coverage:run]
# Coverage runtime settings
branch = True
source = .
omit =
    */tests/*
    */test_*
    */*_test.py
    */__pycache__/*
    .venv/*
    run_all_tests.py
    ai_api_test.py

[coverage:report]
# Coverage report settings
show_missing = True
skip_covered = True
precision = 2
fail_under = 60

[coverage:html]
# HTML report settings
directory = htmlcov
title = Ancestry Project Coverage Report
